name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to upload assets to (for example v1.2.2)
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.arch }}${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: x86_64
            ext: ""
            preset: release
            asset_suffix: ""

          - runner: ubuntu-latest
            os_name: linux
            arch: x86_64
            ext: ""
            preset: release-avx2
            asset_suffix: "-avx2"

          - runner: ubuntu-latest
            os_name: linux
            arch: x86_64
            ext: ""
            preset: release-pext
            asset_suffix: "-pext"

          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: aarch64
            ext: ""
            preset: release
            asset_suffix: ""

          - runner: windows-latest
            os_name: windows
            arch: x86_64
            ext: ".exe"
            preset: release
            asset_suffix: ""
            msystem: CLANG64
            mingw_pkg_prefix: mingw-w64-clang-x86_64
            compiler_pkg: clang

          - runner: windows-latest
            os_name: windows
            arch: x86_64
            ext: ".exe"
            preset: release-avx2
            asset_suffix: "-avx2"
            msystem: CLANG64
            mingw_pkg_prefix: mingw-w64-clang-x86_64
            compiler_pkg: clang

          - runner: windows-latest
            os_name: windows
            arch: x86_64
            ext: ".exe"
            preset: release-pext
            asset_suffix: "-pext"
            msystem: CLANG64
            mingw_pkg_prefix: mingw-w64-clang-x86_64
            compiler_pkg: clang

          - runner: windows-11-arm
            os_name: windows
            arch: aarch64
            ext: ".exe"
            preset: release
            asset_suffix: ""
            msystem: CLANGARM64
            mingw_pkg_prefix: mingw-w64-clang-aarch64
            compiler_pkg: clang

          - runner: macos-13
            os_name: macos
            arch: x86_64
            ext: ""
            preset: release
            asset_suffix: ""

          - runner: macos-13
            os_name: macos
            arch: x86_64
            ext: ""
            preset: release-avx2
            asset_suffix: "-avx2"

          - runner: macos-13
            os_name: macos
            arch: x86_64
            ext: ""
            preset: release-pext
            asset_suffix: "-pext"

          - runner: macos-latest
            os_name: macos
            arch: aarch64
            ext: ""
            preset: release
            asset_suffix: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Clang and Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y clang ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSYS2 / Clang (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: false
          install: >-
            ${{ matrix.mingw_pkg_prefix }}-${{ matrix.compiler_pkg }}
            ${{ matrix.mingw_pkg_prefix }}-cmake
            ${{ matrix.mingw_pkg_prefix }}-ninja

      - name: Configure and build (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake --preset ${{ matrix.preset }} -DPORTABLE_BUILD=ON
          cmake --build --preset ${{ matrix.preset }}

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake --preset ${{ matrix.preset }} -DPORTABLE_BUILD=ON
          cmake --build --preset ${{ matrix.preset }}

      - name: Run tests (Linux / macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      - name: Smoke test
        shell: bash
        run: |
          binary="build/${{ matrix.preset }}/basilisk${{ matrix.ext }}"
          # 'timeout' is GNU coreutils; macOS ships 'gtimeout' instead
          if command -v timeout >/dev/null 2>&1; then
            TIMEOUT="timeout 15"
          elif command -v gtimeout >/dev/null 2>&1; then
            TIMEOUT="gtimeout 15"
          else
            TIMEOUT=""
          fi
          output=$(printf "uci\nquit\n" | $TIMEOUT "./$binary" 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "uciok"   || { echo "FAIL: uciok not found";   exit 1; }
          tag="$RELEASE_TAG"
          version="${tag#v}"  # strip leading 'v' (e.g. "v1.2.2" -> "1.2.2")
          echo "$output" | grep -qF "$version" || { echo "FAIL: version $version not found"; exit 1; }
          echo "Smoke test passed"

      - name: Upload binary to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$RELEASE_TAG"
          os="${{ matrix.os_name }}"
          arch="${{ matrix.arch }}"
          ext="${{ matrix.ext }}"
          suffix="${{ matrix.asset_suffix }}"

          asset="basilisk-${tag}-${os}-${arch}${suffix}${ext}"
          cp "build/${{ matrix.preset }}/basilisk${ext}" "$asset"
          gh release upload "$tag" "$asset" --clobber
